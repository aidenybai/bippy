name: E2E Tests

on: [push, pull_request, workflow_dispatch]

permissions:
  contents: read

jobs:
  e2e-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: packages/e2e
      - name: Run Playwright tests
        run: npx playwright test
        working-directory: packages/e2e
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: packages/e2e/playwright-report/
          retention-days: 14

  e2e-native:
    runs-on: macos-latest
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
      - name: Pre-boot simulator
        # boot early so the simulator warms up during dependency install and
        # the xcode build instead of eating into detox's test time
        run: |
          device_name=$(xcrun simctl list devices available | grep -oE 'iPhone [A-Za-z0-9 ]+' | head -1 | xargs)
          echo "Pre-booting simulator: $device_name"
          echo "DETOX_DEVICE_NAME=$device_name" >> "$GITHUB_ENV"
          xcrun simctl boot "$device_name" || true
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Install applesimutils
        run: brew tap wix/brew && brew trust wix/brew && brew install applesimutils
      - name: Cache CocoaPods downloads
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/CocoaPods
          key: cocoapods-${{ runner.os }}-${{ hashFiles('packages/e2e/fixtures/expo-app/package.json') }}
          restore-keys: cocoapods-${{ runner.os }}-
      - name: Prebuild and build iOS app
        run: |
          cd packages/e2e/fixtures/expo-app
          npx expo prebuild --platform ios --clean
          xcodebuild -workspace ios/bippye2eexpo.xcworkspace -scheme bippye2eexpo -configuration Debug -sdk iphonesimulator -derivedDataPath ios/build -quiet
      - name: Start Metro
        working-directory: packages/e2e/fixtures/expo-app
        # CI=false: expo disables file watching (and therefore fast refresh)
        # when it detects CI, but the refresh spec saves files at runtime
        run: |
          nohup bash -c 'env CI=false npx expo start --port 8081 2>&1 | while IFS= read -r line; do printf "%s %s\n" "$(date +%T)" "$line"; done' > /tmp/metro.log 2>&1 &
          for attempt in $(seq 1 60); do
            if curl -sf http://localhost:8081/status | grep -q "packager-status:running"; then
              echo "Metro is up"
              echo "Warming initial bundle..."
              curl -sf "http://localhost:8081/packages/e2e/fixtures/expo-app/src/index.ts.bundle?platform=ios&dev=true&lazy=true" -o /dev/null || true
              exit 0
            fi
            sleep 2
          done
          echo "Metro failed to start" >&2
          cat /tmp/metro.log >&2
          exit 1
      - name: Get Xcode version
        id: xcode
        run: echo "version=$(xcodebuild -version | tr -d '\n' | tr ' ' '-')" >> "$GITHUB_OUTPUT"
      - name: Cache Detox framework
        id: detox-framework-cache
        uses: actions/cache@v4
        with:
          path: ~/Library/Detox/ios
          key: detox-framework-${{ steps.xcode.outputs.version }}-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Build Detox framework cache
        if: steps.detox-framework-cache.outputs.cache-hit != 'true'
        run: npx detox clean-framework-cache && npx detox build-framework-cache
        working-directory: packages/e2e
      - name: Run Detox tests
        working-directory: packages/e2e
        run: |
          echo "Using simulator: $DETOX_DEVICE_NAME"
          npx detox test --configuration ios.sim.debug --device-name "$DETOX_DEVICE_NAME" --headless --record-logs failing
      - name: Upload Metro log
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: metro-log
          path: /tmp/metro.log
          retention-days: 14
      - name: Upload Detox artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: detox-artifacts
          path: packages/e2e/artifacts/
          retention-days: 14
          if-no-files-found: ignore
